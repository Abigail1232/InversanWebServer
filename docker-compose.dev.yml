services:
  db:
    image: mysql:8.0
    container_name: inversan_db
    restart: unless-stopped
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -p$$MYSQL_ROOT_PASSWORD --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - inversan_net

  redis:
    image: redis:7-alpine
    container_name: inversan_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inversan_net

  frontend:
    build:
      context: ./Web/FrontEnd/
      dockerfile: Dockerfile.dev
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3000}
    container_name: inversan_frontend
    ports:
      - "5000:5173"
    volumes:
      - ./Web/FrontEnd:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    networks:
      - inversan_net

  backend:
    build:
      context: ./Web/Backend/
      dockerfile: Dockerfile
    container_name: inversan_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./Web/Backend:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - inversan_net

volumes:
  db_data:
  redis_data:

networks:
  inversan_net:
